services:
  # 1. AI ENGINE (Backend)
  - type: web
    name: mayersurokkha-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: GEMINI_API_KEY
        sync: false

  # 2. DASHBOARD (Frontend)
  - type: web
    name: mayersurokkha-dashboard
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://mayersurokkha-api.onrender.com
      - key: NEXTAUTH_SECRET
        value: mayer_surokkha_2026_secure_key
      - key: NEXTAUTH_URL
        value: https://mayersurokkha-dashboard.onrender.com
